name: tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync deps (ml + dev)
        run: uv sync --extra ml --extra dev
      - name: Run tests
        run: uv run pytest
