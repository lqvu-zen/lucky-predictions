name: daily-crawl

# Runs the crawl in the cloud so you don't need your PC on.
# - Fetches the latest Power 6/55 and 6/45 draws
# - Commits new draws back into data/*.jsonl
# - Builds the HTML dashboard and uploads it as a downloadable artifact

on:
  schedule:
    # 14:30 UTC = 21:30 Vietnam time (UTC+7). GitHub may delay scheduled runs.
    - cron: "30 14 * * *"
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # allow committing updated data back to the repo

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Crawl + analyze + build dashboard
        run: uv run python run.py daily

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.jsonl
          if git diff --staged --quiet; then
            echo "No new draws today."
          else
            git commit -m "data: update draws ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Upload dashboard + report artifact
        uses: actions/upload-artifact@v4
        with:
          name: vietlott-dashboard
          path: |
            reports/dashboard.html
            reports/latest.md
          retention-days: 30
          if-no-files-found: warn
