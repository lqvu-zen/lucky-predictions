name: daily-crawl

# Runs the crawl in the cloud so you don't need your PC on.
# - Fetches the latest Power 6/55 and 6/45 draws
# - Commits new draws back into data/*.jsonl
# - Runs the ML predict->score loop (scorecard persists in predictions/)
# - Builds the HTML dashboard (with ML scorecard), uploads it as an artifact,
#   and publishes it to GitHub Pages (repo is public)

on:
  schedule:
    # 14:30 UTC = 21:30 Vietnam time (UTC+7). GitHub may delay scheduled runs.
    - cron: "30 14 * * *"
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # commit updated data back to the repo
  pages: write               # deploy to GitHub Pages
  id-token: write            # required by the Pages deploy action

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (with ML extras)
        run: uv sync --extra ml

      - name: Crawl + analyze + ML loop + build dashboard
        run: uv run python run.py daily

      - name: Commit updated data + predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git add predictions 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing new to commit today."
          else
            git commit -m "data+predictions: daily update ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp reports/dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Upload dashboard + report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucky-dashboard
          path: |
            reports/dashboard.html
            reports/latest.md
          retention-days: 30
          if-no-files-found: warn

  deploy-pages:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
